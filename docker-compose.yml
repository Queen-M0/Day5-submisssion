services:
  mysql:
    image: mysql:8.4
    container_name: contextguard-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ai_moderation
      MYSQL_USER: contextguard
      MYSQL_PASSWORD: contextguard
      MYSQL_ROOT_PASSWORD: contextguard-root
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - contextguard_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucontextguard", "-pcontextguard"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  contextguard_mysql_data:

